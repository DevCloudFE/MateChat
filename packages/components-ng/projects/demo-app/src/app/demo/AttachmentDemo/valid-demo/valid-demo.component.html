<mc-input [value]="inputValue" placeholder="点击左侧图标上传附件...">
  <ng-template #extra>
    <div class="input-foot-left">
      <mc-attachment
        [draggable]="false"
        [uploadOptions]="uploadOptions"
        [beforeUpload]="handleBeforeUpload"
        accept="image/*"
        [maxSize]="0.5"
        [maxCount]="3"
        [multiple]="true"
        (validChange)="onValidChange($event)"
      >
        <i class="icon-appendix"></i>
      </mc-attachment>
    </div>
  </ng-template>
</mc-input>
