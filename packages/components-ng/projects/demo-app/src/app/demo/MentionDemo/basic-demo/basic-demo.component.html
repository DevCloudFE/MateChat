<div class="demo-content">
    <mc-mention [(ngModel)]="isVisible" [prefix]="prefix"
      (searchChange)="onSearchChange($event)" (toggleChange)="onToggleChange($event)">
      <mc-input #inputRef [value]="inputValue" (change)="onInputChange($event)" placeholder="输入/@ 触发提及功能"></mc-input>
      <div slot="menu" class="mention-menu">
        <mc-list [data]="listData" (select)="onListSelect($event)"></mc-list>
      </div>
    </mc-mention>
  </div>
