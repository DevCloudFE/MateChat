<div class="format-content-demo">
  <div class="button-wrapper">
    <button class="demo-btn" variant="solid" (click)="setMixTags()">自定义编排插入</button>
  </div>
  <mc-input
    [formatContentOptions]="formatContentOptions"
    placeholder="请输入您的问题，并按Enter发送，按Shift + Enter换行"
    (change)="onInputChange($event)"
    (submit)="onSubmit($event)"
  >
    <ng-template #themeTag let-themeTagText="themeTagText">
      <span class="tip-tag-custom">
        <i class="icon-code-editor-close"></i>
        <span class="tip-tag-icon icon-default"></span>
        <span class="ai-input-prefix">{{themeTagText}}</span>
      </span>
    </ng-template>
  </mc-input>
</div>
