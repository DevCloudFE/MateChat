<div class="mc-layout-content-container">
  <div class="mc-layout-content-scroller" #scrollerRef>
    <div class="mc-layout-content" #contentRef>
      <ng-content></ng-content>
    </div>
  </div>
  <ng-container *ngIf="showScrollArrow">
    <div *ngIf="showUpArrow" class="mc-layout-content-arrow up" (click)="scrollToTop()">
      <div>
        <mc-arrow-up-icon />
      </div>
    </div>
    <div *ngIf="showDownArrow" class="mc-layout-content-arrow down" (click)="scrollToBottom()">
      <div>
        <mc-arrow-down-icon />
      </div>
    </div>
  </ng-container>
</div>
